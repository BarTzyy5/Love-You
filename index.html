<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title> Wiska & Akbar | 25 Mei 2027</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div class="splash" id="splashScreen">
  <div class="splash-content">
    <div class="couple-name">
      akbar love wiska
    </div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
  </div>
</div>

<!-- Modal Preview Foto -->
<div class="modal" id="photoModal" onclick="closeModal()">
  <img id="modalImage" src="" alt="Foto Wiska & Akbar">
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
  <div class="heart-bg" id="heartContainer"></div>

  <div class="card">
    <div class="badge-date">
      TANGGAL JADIAN
    </div>
    <h1>akbar & wiska</h1>
    
    <!-- FOTO COUPLE -->
    <div class="photo-container">
      <img class="couple-photo" 
           id="couplePhoto"
           src="https://files.catbox.moe/ht79sk.jpg" 
           alt="akbar & wiska"
           onclick="openModal(this.src)">
    </div>

    <div class="sub">
      Senin, 25 Mei 2027
    </div>

    <div class="timer-wrapper">
      <div class="countdown" id="countdown">
        <div class="time-block">
          <div class="time-number" id="days">00</div>
          <div class="time-label">Hari</div>
        </div>
        <div class="time-block">
          <div class="time-number" id="hours">00</div>
          <div class="time-label">Jam</div>
        </div>
        <div class="time-block">
          <div class="time-number" id="minutes">00</div>
          <div class="time-label">Menit</div>
        </div>
        <div class="time-block">
          <div class="time-number" id="seconds">00</div>
          <div class="time-label">Detik</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
